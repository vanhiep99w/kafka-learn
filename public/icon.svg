<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#1A1A2E"/>

  <!-- Kafka "K" lettermark with streaming lines -->

  <!-- Left vertical bar of K -->
  <rect x="7" y="7" width="4" height="18" rx="1.5" fill="#FF6B35"/>

  <!-- Upper diagonal of K -->
  <path d="M11 16 L22 8" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Lower diagonal of K -->
  <path d="M11 16 L22 24" stroke="#FF6B35" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Stream dots (right side) -->
  <circle cx="26" cy="10" r="1.5" fill="#FF6B35" opacity="0.5"/>
  <circle cx="26" cy="16" r="1.5" fill="#FF6B35" opacity="0.8"/>
  <circle cx="26" cy="22" r="1.5" fill="#FF6B35" opacity="0.5"/>
</svg>
